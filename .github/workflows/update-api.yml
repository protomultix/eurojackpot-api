name: Update Eurojackpot API

on:
  workflow_dispatch:
  schedule:
    # Run after the Tuesday/Friday Eurojackpot draw.
    # The timezone keeps the schedule aligned with Germany.
    - cron: "30 21 * * TUE,FRI"
      timezone: "Europe/Berlin"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  START_DATE: "2022-03-25"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static API files
        run: python scripts/update_eurojackpot.py

      - name: Commit generated API files
        run: |
          if [ -z "$(git status --porcelain public)" ]; then
            echo "No API changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git commit -m "Update Eurojackpot API"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
